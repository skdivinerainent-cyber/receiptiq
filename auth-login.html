<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReceiptIQ — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080a0d;--surface:#111520;--border:#1a2035;--border2:#202840;--accent:#4fffb0;--text:#e8edf8;--muted:#4a5568;--label:#8892a4;--error:#ff6b6b}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse 70% 70% at 50% 50%,black,transparent);opacity:0.2}
.glow{position:fixed;width:600px;height:600px;background:radial-gradient(ellipse,rgba(79,255,176,0.05) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
.card{background:var(--surface);border:1px solid var(--border2);border-radius:20px;padding:40px;width:100%;max-width:420px;position:relative;z-index:1;box-shadow:0 40px 80px rgba(0,0,0,0.6)}
.logo{font-family:'Instrument Serif',serif;font-size:22px;display:flex;align-items:center;gap:8px;justify-content:center;margin-bottom:32px;text-decoration:none;color:var(--text)}
.logo-dot{width:8px;height:8px;background:var(--accent);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
h2{font-family:'Instrument Serif',serif;font-size:28px;text-align:center;margin-bottom:6px}
.subtitle{font-size:13px;color:var(--label);text-align:center;margin-bottom:28px}
.form-group{margin-bottom:14px}
label{display:block;font-size:11px;font-weight:600;letter-spacing:0.05em;color:var(--label);margin-bottom:6px;font-family:'JetBrains Mono',monospace;text-transform:uppercase}
input{width:100%;background:#0d1017;border:1px solid var(--border2);border-radius:8px;padding:12px 14px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:all 0.2s}
input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,255,176,0.08)}
input::placeholder{color:var(--muted)}
.submit-btn{width:100%;background:var(--accent);color:#000;border:none;border-radius:8px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;transition:all 0.2s;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px}
.submit-btn:hover:not(:disabled){background:#6fffbf;transform:translateY(-1px)}
.submit-btn:disabled{opacity:0.6;cursor:not-allowed;transform:none}
.spinner{width:16px;height:16px;border:2px solid rgba(0,0,0,0.3);border-top-color:#000;border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{background:rgba(255,107,107,0.08);border:1px solid rgba(255,107,107,0.2);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--error);margin-bottom:14px;display:none}
.success-box{background:rgba(79,255,176,0.06);border:1px solid rgba(79,255,176,0.15);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--accent);margin-bottom:14px;display:none}
.switch-link{text-align:center;font-size:13px;color:var(--label);margin-top:20px}
.switch-link a{color:var(--accent);text-decoration:none;font-weight:600}
.secure-note{text-align:center;font-size:10px;color:var(--muted);margin-top:16px;font-family:'JetBrains Mono',monospace}
</style>
</head>
<body>
<div class="glow"></div>
<div class="card">
  <a href="landing-page.html" class="logo"><div class="logo-dot"></div>ReceiptIQ</a>
  <h2>Welcome back</h2>
  <p class="subtitle">Sign in to your account</p>

  <div class="error-box" id="errorBox"></div>
  <div class="success-box" id="successBox"></div>

  <div class="form-group">
    <label>Email address</label>
    <input type="email" id="email" placeholder="you@firm.com" autocomplete="email">
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••••" autocomplete="current-password">
  </div>

  <button class="submit-btn" id="loginBtn" onclick="handleLogin()">
    Sign In →
  </button>

  <div class="switch-link" style="margin-top:16px">
    Don't have an account? <a href="auth-signup.html">Start free trial</a>
  </div>
  <div class="secure-note">// 256-bit encryption · SOC 2 compliant · GDPR ready</div>
</div>

<script>
  // Init Supabase
  const { createClient } = supabase;
  const sb = createClient(RECEIPTIQ_CONFIG.SUPABASE_URL, RECEIPTIQ_CONFIG.SUPABASE_ANON_KEY);

  // Check if already logged in
  async function checkSession() {
    const { data: { session } } = await sb.auth.getSession();
    if (session) window.location.href = 'dashboard-overview.html';
  }
  checkSession();

  async function handleLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');
    const errorBox = document.getElementById('errorBox');
    const successBox = document.getElementById('successBox');

    errorBox.style.display = 'none';
    successBox.style.display = 'none';

    if (!email || !password) {
      errorBox.textContent = 'Please enter your email and password.';
      errorBox.style.display = 'block';
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div> Signing in...';

    const { data, error } = await sb.auth.signInWithPassword({ email, password });

    if (error) {
      errorBox.textContent = error.message;
      errorBox.style.display = 'block';
      btn.disabled = false;
      btn.innerHTML = 'Sign In →';
      return;
    }

    successBox.textContent = '✓ Signed in! Redirecting to dashboard...';
    successBox.style.display = 'block';
    setTimeout(() => window.location.href = 'dashboard-overview.html', 800);
  }

  // Allow Enter key
  document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
</script>
</body>
</html>
