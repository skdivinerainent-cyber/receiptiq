<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReceiptIQ — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080a0d;--surface:#111520;--border:#1a2035;--border2:#202840;--accent:#4fffb0;--text:#e8edf8;--muted:#4a5568;--label:#8892a4}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse 70% 70% at 50% 50%,black,transparent);opacity:0.2}
.glow{position:fixed;width:600px;height:600px;background:radial-gradient(ellipse,rgba(79,255,176,0.05) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
.card{background:var(--surface);border:1px solid var(--border2);border-radius:20px;padding:40px;width:100%;max-width:420px;position:relative;z-index:1;box-shadow:0 40px 80px rgba(0,0,0,0.6)}
.logo{font-family:'Instrument Serif',serif;font-size:22px;display:flex;align-items:center;gap:8px;justify-content:center;margin-bottom:32px}
.logo-dot{width:8px;height:8px;background:var(--accent);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
h2{font-family:'Instrument Serif',serif;font-size:28px;text-align:center;margin-bottom:6px;letter-spacing:-0.01em}
.subtitle{font-size:13px;color:var(--label);text-align:center;margin-bottom:28px}
.form-group{margin-bottom:14px}
label{display:block;font-size:11px;font-weight:600;letter-spacing:0.05em;color:var(--label);margin-bottom:6px;font-family:'JetBrains Mono',monospace;text-transform:uppercase}
input{width:100%;background:#0d1017;border:1px solid var(--border2);border-radius:8px;padding:12px 14px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:all 0.2s}
input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,255,176,0.08)}
input::placeholder{color:var(--muted)}
.forgot{text-align:right;margin-top:4px}
.forgot a{font-size:11px;color:var(--label);text-decoration:none;font-family:'JetBrains Mono',monospace}
.forgot a:hover{color:var(--accent)}
.submit-btn{width:100%;background:var(--accent);color:#000;border:none;border-radius:8px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;transition:all 0.2s;font-family:'DM Sans',sans-serif}
.submit-btn:hover{background:#6fffbf;transform:translateY(-1px)}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border2)}
.switch-link{text-align:center;font-size:13px;color:var(--label);margin-top:20px}
.switch-link a{color:var(--accent);text-decoration:none;font-weight:600}
.switch-link a:hover{color:#6fffbf}
.secure-note{text-align:center;font-size:10px;color:var(--muted);margin-top:16px;font-family:'JetBrains Mono',monospace}
</style>
</head>
<body>
<div class="glow"></div>
<div class="card">
  <div class="logo"><div class="logo-dot"></div>ReceiptIQ</div>
  <h2>Welcome back</h2>
  <p class="subtitle">Sign in to your account</p>
  <div class="form-group">
    <label>Email address</label>
    <input type="email" placeholder="you@firm.com">
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" placeholder="••••••••••">
    <div class="forgot"><a href="#">Forgot password?</a></div>
  </div>
  <button class="submit-btn" onclick="window.location='dashboard-overview.html'">Sign In →</button>
  <div class="divider">or</div>
  <div class="switch-link">Don't have an account? <a href="auth-signup.html">Start free trial</a></div>
  <div class="secure-note">// 256-bit encryption · SOC 2 compliant · GDPR ready</div>
</div>
</body>
</html>
