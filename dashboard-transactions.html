<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReceiptIQ — Transactions</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080a0d;--bg2:#0d1017;--surface:#111520;--surface2:#161c2a;--border:#1a2035;--border2:#202840;--accent:#4fffb0;--accent2:#3b82f6;--accent3:#f5c842;--accent4:#ff6b6b;--text:#e8edf8;--muted:#4a5568;--label:#8892a4}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh}
.sidebar{width:240px;min-height:100vh;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:50}
.sidebar-logo{padding:24px 20px;border-bottom:1px solid var(--border);font-family:'Instrument Serif',serif;font-size:20px;display:flex;align-items:center;gap:8px}
.logo-dot{width:8px;height:8px;background:var(--accent);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.sidebar-section{padding:20px 12px 8px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted)}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;color:var(--label);font-size:13px;font-weight:500;text-decoration:none;transition:all 0.15s;margin:1px 8px}
.nav-item:hover{background:var(--surface);color:var(--text)}
.nav-item.active{background:rgba(79,255,176,0.08);color:var(--accent);border:1px solid rgba(79,255,176,0.12)}
.nav-icon{font-size:15px;width:20px;text-align:center}
.sidebar-bottom{margin-top:auto;border-top:1px solid var(--border);padding:16px}
.user-card{display:flex;align-items:center;gap:10px;padding:10px;border-radius:8px}
.user-avatar{width:32px;height:32px;border-radius:8px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#000;flex-shrink:0}
.user-name{font-size:13px;font-weight:600}
.user-plan{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace}
.main{margin-left:240px;flex:1;display:flex;flex-direction:column}
.topbar{height:60px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;background:rgba(8,10,13,0.8);backdrop-filter:blur(12px);position:sticky;top:0;z-index:40}
.topbar-left{display:flex;align-items:center;gap:16px}
.page-title{font-size:15px;font-weight:600}
.breadcrumb{font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace}
.topbar-right{display:flex;gap:10px}
.topbar-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:6px;font-size:12px;font-weight:600;border:1px solid var(--border2);color:var(--label);background:transparent;cursor:pointer;transition:all 0.2s;text-decoration:none}
.topbar-btn:hover{border-color:var(--label);color:var(--text)}
.topbar-btn.primary{background:var(--accent);color:#000;border-color:var(--accent)}
.content{padding:28px;flex:1}
.filters{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.search-box{flex:1;min-width:200px;background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:9px 14px;display:flex;align-items:center;gap:8px}
.search-box input{background:transparent;border:none;outline:none;color:var(--text);font-size:13px;width:100%;font-family:'DM Sans',sans-serif}
.search-box input::placeholder{color:var(--muted)}
.filter-btn{padding:9px 14px;border-radius:8px;font-size:11px;font-weight:500;border:1px solid var(--border2);color:var(--label);background:var(--surface);cursor:pointer;transition:all 0.2s;font-family:'JetBrains Mono',monospace}
.filter-btn:hover,.filter-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(79,255,176,0.06)}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.table-meta-row{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.table-meta{font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace}
table{width:100%;border-collapse:collapse}
th{padding:10px 20px;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);font-family:'JetBrains Mono',monospace;border-bottom:1px solid var(--border);text-align:left;font-weight:500}
td{padding:13px 20px;border-bottom:1px solid var(--border);font-size:13px;color:var(--label);vertical-align:middle}
tr:hover td{background:var(--surface2);cursor:pointer}
tr:last-child td{border:none}
.merchant-cell{display:flex;align-items:center;gap:10px;color:var(--text)}
.m-thumb{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;background:rgba(79,255,176,0.08)}
.cat-pill{font-size:10px;padding:3px 8px;border-radius:4px;font-family:'JetBrains Mono',monospace;white-space:nowrap}
.cat-Travel{background:rgba(59,130,246,0.1);color:var(--accent2)}
.cat-Meals{background:rgba(245,200,66,0.1);color:var(--accent3)}
.cat-Office{background:rgba(79,255,176,0.08);color:var(--accent)}
.cat-Software{background:rgba(255,107,107,0.1);color:var(--accent4)}
.cat-Other{background:rgba(168,85,247,0.1);color:#c084fc}
.amount-col{font-weight:600;color:var(--accent);font-family:'JetBrains Mono',monospace;font-size:12px;text-align:right}
.status-pill{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-family:'JetBrains Mono',monospace}
.sdot{width:5px;height:5px;border-radius:50%}
.s-done{color:var(--accent)}.s-done .sdot{background:var(--accent)}
.s-review{color:var(--accent3)}.s-review .sdot{background:var(--accent3)}
.empty-state{padding:60px;text-align:center;color:var(--muted)}
.skeleton{background:linear-gradient(90deg,var(--surface2) 25%,var(--border2) 50%,var(--surface2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:4px;height:14px;margin:4px 0}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo"><div class="logo-dot"></div>ReceiptIQ</div>
  <div class="sidebar-section">Main</div>
  <a class="nav-item" href="dashboard-overview.html"><span class="nav-icon">⬛</span> Overview</a>
  <a class="nav-item" href="dashboard-upload.html"><span class="nav-icon">⬆</span> Upload Receipt</a>
  <a class="nav-item active" href="dashboard-transactions.html"><span class="nav-icon">≡</span> Transactions</a>
  <a class="nav-item" href="dashboard-reports.html"><span class="nav-icon">↗</span> Reports</a>
  <div class="sidebar-section">Accountant</div>
  <a class="nav-item" href="#"><span class="nav-icon">👥</span> Clients</a>
  <a class="nav-item" href="#"><span class="nav-icon">✓</span> Review Queue</a>
  <div class="sidebar-bottom">
    <div class="user-card">
      <div class="user-avatar" id="userInitials">?</div>
      <div><div class="user-name" id="userName">Loading...</div><div class="user-plan" id="userPlan">—</div></div>
    </div>
  </div>
</aside>

<main class="main">
  <div class="topbar">
    <div class="topbar-left">
      <div class="breadcrumb">dashboard /</div>
      <div class="page-title">Transactions</div>
    </div>
    <div class="topbar-right">
      <a href="dashboard-upload.html" class="topbar-btn primary">+ Upload</a>
      <button class="topbar-btn" onclick="exportCSV()">↓ Export CSV</button>
    </div>
  </div>
  <div class="content">
    <div class="filters">
      <div class="search-box"><span style="color:var(--muted)">🔍</span><input id="searchInput" placeholder="Search merchant, category..." oninput="filterTable()"></div>
      <button class="filter-btn active" onclick="filterCat(this,'all')">All</button>
      <button class="filter-btn" onclick="filterCat(this,'Travel')">Travel</button>
      <button class="filter-btn" onclick="filterCat(this,'Meals')">Meals</button>
      <button class="filter-btn" onclick="filterCat(this,'Software')">Software</button>
      <button class="filter-btn" onclick="filterCat(this,'Office')">Office</button>
    </div>
    <div class="table-wrap">
      <div class="table-meta-row">
        <div class="table-meta" id="tableMeta">Loading...</div>
        <div class="table-meta" id="tableTotal">—</div>
      </div>
      <div id="tableBody">
        <div style="padding:24px"><div class="skeleton" style="width:100%"></div><div class="skeleton" style="width:80%"></div><div class="skeleton" style="width:90%"></div></div>
      </div>
    </div>
  </div>
</main>

<script>
const { createClient } = supabase;
const sb = createClient(RECEIPTIQ_CONFIG.SUPABASE_URL, RECEIPTIQ_CONFIG.SUPABASE_ANON_KEY);

let allTxns = [];
let activeFilter = 'all';
const icons = {Travel:'✈️',Meals:'🍽️',Software:'💻',Office:'📎',Other:'🧾','Client Entertainment':'🤝'};

async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = 'auth-login.html'; return; }
  const meta = session.user.user_metadata;
  const name = meta.full_name || session.user.email;
  document.getElementById('userInitials').textContent = name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
  document.getElementById('userName').textContent = name;
  document.getElementById('userPlan').textContent = (meta.plan||'starter').replace('_',' ');
  loadTransactions();
}

async function loadTransactions() {
  const { data, error } = await sb.from('transactions').select('*').order('transaction_date', {ascending: false});
  allTxns = data || [];
  renderTable(allTxns);
}

function renderTable(txns) {
  const total = txns.reduce((s,t) => s + (t.amount||0), 0);
  document.getElementById('tableMeta').textContent = txns.length + ' transactions';
  document.getElementById('tableTotal').textContent = 'Total: $' + total.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});

  if (txns.length === 0) {
    document.getElementById('tableBody').innerHTML = `
      <div class="empty-state">
        <div style="font-size:32px;margin-bottom:12px;opacity:0.4">📭</div>
        No transactions yet.<br>
        <a href="dashboard-upload.html" style="color:var(--accent);font-size:13px">Upload your first receipt →</a>
      </div>`;
    return;
  }

  document.getElementById('tableBody').innerHTML = `
    <table>
      <thead><tr>
        <th>Merchant</th><th>Category</th><th>Date</th><th style="text-align:right">Amount</th><th>Status</th>
      </tr></thead>
      <tbody>
        ${txns.map(t => {
          const cat = t.category || 'Other';
          const icon = icons[cat] || '🧾';
          const date = t.transaction_date ? new Date(t.transaction_date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '—';
          const statusClass = t.status === 'review' ? 's-review' : 's-done';
          const statusLabel = t.status === 'review' ? 'Review' : 'Done';
          return `<tr>
            <td><div class="merchant-cell"><div class="m-thumb">${icon}</div><div>${t.merchant||'Unknown'}</div></div></td>
            <td><span class="cat-pill cat-${cat}">${cat}</span></td>
            <td style="font-family:'JetBrains Mono',monospace;font-size:11px">${date}</td>
            <td class="amount-col">$${(t.amount||0).toFixed(2)}</td>
            <td><span class="status-pill ${statusClass}"><div class="sdot"></div>${statusLabel}</span></td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>`;
}

function filterCat(btn, cat) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = cat;
  filterTable();
}

function filterTable() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  let filtered = allTxns;
  if (activeFilter !== 'all') filtered = filtered.filter(t => t.category === activeFilter);
  if (search) filtered = filtered.filter(t => (t.merchant||'').toLowerCase().includes(search) || (t.category||'').toLowerCase().includes(search));
  renderTable(filtered);
}

function exportCSV() {
  if (!allTxns.length) { alert('No transactions to export.'); return; }
  const headers = ['Merchant','Amount (USD)','Currency','Date','Category','Tax Status','Description'];
  const rows = allTxns.map(t => [
    t.merchant||'', t.amount||0, t.currency_original||'USD',
    t.transaction_date||'', t.category||'', t.tax_status||'', t.description||''
  ]);
  const csv = [headers, ...rows].map(r => r.map(v => `"${v}"`).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'receiptiq-transactions-' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
}

init();
</script>
</body>
</html>
